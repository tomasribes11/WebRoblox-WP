server {
    listen 80;
    server_name localhost;
    root /var/www/html;
    index index.php index.html;

    client_max_body_size 20M;

    # ─── Bloquear acceso a archivos sensibles ───────────────────────────────
    location ~* (wp-config\.php|\.htaccess|xmlrpc\.php) {
        deny all;
        return 404;
    }

    # ─── Assets estáticos (tema, uploads) ───────────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1M;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ─── Uploads de WordPress ────────────────────────────────────────────────
    location ^~ /wp-content/uploads/ {
        try_files $uri =404;
    }

    # ─── Routing principal de WordPress (pretty permalinks) ─────────────────
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # ─── PHP via FastCGI ─────────────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass          php-fpm:9000;
        fastcgi_index         index.php;
        fastcgi_param         SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include               fastcgi_params;
        fastcgi_buffer_size   128k;
        fastcgi_buffers       4 256k;
        fastcgi_read_timeout  60;
    }
}
